name: Wellness MFE CI

on:
  push:
    paths:
      - 'projects/wellness/**'
  pull_request:
    paths:
      - 'projects/wellness/**'

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install
        run: cd projects/wellness && npm install
      - name: Lint
        run: cd projects/wellness && npm run lint
      - name: Test
        run: cd projects/wellness && npm test
      - name: Build
        run: cd projects/wellness && npm run build
