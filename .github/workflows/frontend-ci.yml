name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate_mfes:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [mfe-shell, projects/wellness, projects/sales-crm, projects/discover-equestrian, projects/boatdox, projects/candidSuite, projects/nuway-roofing, projects/core-utilities]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Install root dependencies
      run: npm install
        
    - name: Install ${{ matrix.project }} dependencies
      run: |
        cd ${{ matrix.project }}
        npm install
      
    - name: Lint check ${{ matrix.project }}
      run: |
        cd ${{ matrix.project }}
        npm run lint
      
    - name: Run Units Tests ${{ matrix.project }}
      run: |
        cd ${{ matrix.project }}
        npm test || echo "No tests found or tests failed"
      
    - name: Build ${{ matrix.project }}
      run: |
        cd ${{ matrix.project }}
        npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  security_scan:
    needs: validate_mfes
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Security Scan (Snyk)
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy:
    needs: security_scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy Orchestration
      run: echo "Deployment triggered for production branch across all MFEs"
